<html>
<head>
    <!-- Without this '×' may not be rendered correctly //-->
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <!-- <link href="https://fonts.googleapis.com/css?family=VT323&display=swap" rel="stylesheet"> //-->
    <title>KOTAMA</title>
    <meta property='og:title' content='KOTAMA'/>
    <meta property='og:description' content='My ideal task manager'>
    <meta property='og:type' content='website'/>
</head>
<body>
<div>
    <script>
        window.version = '0.3.83';
        const mainScript = document.createElement('script');
        mainScript.src = `client.js?v=${version}`;
        document.body.append(mainScript);
        const mainStyles = document.createElement('link');
        mainStyles.type = 'text/css';
        mainStyles.rel = 'stylesheet'
        mainStyles.href = `styles.css?v=${version}`;
        document.head.append(mainStyles);
    </script>
<!-- game -->
<div id="main">

    <button id="createNewTask">+</button>

    <!-- task edit window -->
    <div id="taskEditWindow" style="background-color: lightgrey; display: none; z-index: 1;">
        
        <!-- save / cancel -->
        <button id="taskEditWindow-cancelEdit" class="alterDataBase"> cancel </button>
        <button id="taskEditWindow-saveEdit" class="alterDataBase"> save </button>

        <!-- is done / title / event? -->
        <div><input id="taskEditWindow-isTaskDone" type="checkBox">
            <input id="taskEditWindow-taskTitle">
            <input id="taskEditWindow-isEvent" type="checkBox">event</div>

        <!-- scheduling option -->
        <div id="taskEditWindow-schedulingOption" >
            <input type="radio" id="taskEditWindow-isSchedule" name="scheduleOption" >
            <label for="schedule">Schedule</label>
            <input type="radio" id="taskEditWindow-isPending" name="scheduleOption" >
            <label for="pending">Pending</label>
            <input type="radio" id="taskEditWindow-isNone" name="scheduleOption" >
            <label for="none">None</label>
        </div>

        <!-- schedule  -->
        <div id="taskEditWindow-schedule">
            <input id="taskEditWindow-start" type="dateTime-local"> to <input id="taskEditWindow-due" type="dateTime-local">
            <input id="taskEditWindow-isRepeating" type="checkBox"> Repeat 
            <div id="taskEditWindow-repeat">
                <div id="taskEditWindow-repeatForm">
                    Frequency: <input id="taskEditWindow-repeatFreq" type="number" min="1"> days <br>
                    repeatStart: <input id="taskEditWindow-repeatStartDate" type="date"><br>
                    <input id="taskEditWindow-isRepeatEnd" type="checkBox">repeatEnd: <input id="taskEditWindow-repeatEndDate" type="date">
                </div>
            </div>
            <div><input id="taskEditWindow-duration" type="number"> min</div>
        </div>
         
        <div>priority: <input id="taskEditWindow-priority" type="number"></div>
        <div><input id="taskEditWindow-description"></div>
        
        <div>dependancies<button id="taskEditWindow-addDependancy">+</button>
            <div id="taskEditWindow-dependancyList"></div>
        </div>
        <div style="z-index: 3; background: grey; display: block;"><div id="taskEditWindow-dependancy-taskSearch" style="display: none;"></div></div>
        <div>components<button id="taskEditWindow-addComponent">+</button>
            <div id="taskEditWindow-componentList"></div>
        </div>
        <div style="z-index: 3; background: grey; display: block;"><div id="taskEditWindow-component-taskSearch" style="display: none;"></div></div>
        <div id="taskEditWindow-subjects"> subjects
            <div id="taskEditWindow-subjectList"></div>
        </div>
        <div id="taskEditWindow-owner"> owner 
            <div id="taskEditWindow-ownerList"></div>
        </div>
        delete
        <button id="taskEditWindow-deleteTask"> delete</button>
        
        
    </div>
    <div style="position: absolute; left: 10; top: 400; z-index: 0;">
        TaskDataBase  <div id="dataBase" style=" float: right"></div>
    </div>
    <div style="position: absolute; left: 10; top: 450; z-index: 0;">
        Scheduled  <div id="schedule" style=" float: right"></div>
    </div>
    <div style="position: absolute; left: 10; top: 500; z-index: 0;">
        MustDo  <div id="mustDo" style=" float: right"></div>
    </div>
    <div style="position: absolute; left: 10; top: 550; z-index: 0;">
        ToDo  <div id="toDo" style=" float: right"></div>
    </div>
</div>

</div>
</body>
</html>
